<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4DA2FF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#4DA2FF" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#4DA2FF" stroke-width="1"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Logo / Brand name -->
  <text x="80" y="120" font-family="Inter, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="#4DA2FF" letter-spacing="-1">SweeFi</text>

  <!-- Tagline -->
  <text x="80" y="230" font-family="Inter, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#e4e4e7" letter-spacing="-1.5">Give your AI agents a budget,</text>
  <text x="80" y="295" font-family="Inter, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#e4e4e7" letter-spacing="-1.5">not a blank check.</text>

  <!-- Divider -->
  <rect x="80" y="340" width="120" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Stats row -->
  <text x="80" y="410" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="500" fill="#4DA2FF">5</text>
  <text x="105" y="410" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#71717a"> payment schemes</text>

  <text x="370" y="410" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="500" fill="#4DA2FF">1,079</text>
  <text x="445" y="410" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#71717a"> tests</text>

  <text x="555" y="410" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="500" fill="#4DA2FF">35</text>
  <text x="590" y="410" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#71717a"> MCP tools</text>

  <text x="770" y="410" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="500" fill="#4DA2FF">10</text>
  <text x="805" y="410" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#71717a"> Move modules</text>

  <!-- Subtitle -->
  <text x="80" y="475" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#a1a1aa">Open-source agentic payment infrastructure</text>

  <!-- Bottom row: tech badges -->
  <rect x="80" y="530" width="60" height="32" rx="6" fill="#1a1a2e" stroke="#27273a" stroke-width="1"/>
  <text x="110" y="551" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#4DA2FF" text-anchor="middle">Sui</text>

  <rect x="155" y="530" width="100" height="32" rx="6" fill="#1a1a2e" stroke="#27273a" stroke-width="1"/>
  <text x="205" y="551" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#e4e4e7" text-anchor="middle">s402</text>

  <rect x="270" y="530" width="120" height="32" rx="6" fill="#1a1a2e" stroke="#27273a" stroke-width="1"/>
  <text x="330" y="551" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#e4e4e7" text-anchor="middle">Apache 2.0</text>

  <rect x="405" y="530" width="130" height="32" rx="6" fill="#1a1a2e" stroke="#27273a" stroke-width="1"/>
  <text x="470" y="551" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#e4e4e7" text-anchor="middle">TypeScript</text>

  <rect x="550" y="530" width="100" height="32" rx="6" fill="#1a1a2e" stroke="#27273a" stroke-width="1"/>
  <text x="600" y="551" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#e4e4e7" text-anchor="middle">Move</text>

  <!-- sweefi.xyz URL -->
  <text x="1120" y="555" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="400" fill="#52525b" text-anchor="end">sweefi.xyz</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>
</svg>
