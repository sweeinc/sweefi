# SweeFi Demo Server — sweefi-demo.fly.dev
# Deploy: fly deploy --remote-only
#
# Required secrets (set via `fly secrets set`):
#   MERCHANT_ADDRESS - Sui address to receive payments
#
# Optional secrets:
#   PORT - defaults to 3402

app = "sweefi-demo"
primary_region = "lax"

[build]

[http_service]
  internal_port = 3402
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 3402
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
